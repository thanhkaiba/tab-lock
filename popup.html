<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tab Lock</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <label class="toggle" aria-label="Lock this tab">
      <input type="checkbox" id="lock-toggle">
      <span class="slider"></span>
    </label>
    <span id="status-label">Unlocked</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
